name: Deploy to Azure Functions

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build webhook binary (Linux)
        run: |
          GOOS=linux GOARCH=amd64 go build -o webhook/webhook ./cmd/webhook/main.go

      - name: Create deploy package
        run: |
          zip -r deploy.zip webhook/ host.json

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: pylon-sync-func
          package: deploy.zip
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
